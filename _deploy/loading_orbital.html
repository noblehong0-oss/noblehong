<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Noble Hong — Loading</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Cormorant+Garamond:wght@400;600;700&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0d0b08;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .text-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 2;
      }
      .msg {
        font-family: "Noto Serif KR", serif;
        font-size: 18px;
        font-weight: 300;
        color: rgba(201, 169, 78, 0);
        letter-spacing: 4px;
        transition:
          color 1s,
          transform 1s;
        transform: translateY(60px);
      }
      .msg.visible {
        color: rgba(201, 169, 78, 0.85);
        transform: translateY(55px);
      }
      .msg.done {
        color: rgba(232, 201, 106, 1);
        transform: translateY(55px);
      }
      .dots {
        display: inline;
      }
      .sub-msg {
        font-family: "Cormorant Garamond", serif;
        font-size: 14px;
        font-weight: 400;
        color: rgba(201, 169, 78, 0);
        letter-spacing: 6px;
        text-transform: uppercase;
        transition:
          color 1.2s,
          transform 1.2s;
        transform: translateY(70px);
        margin-top: 8px;
      }
      .sub-msg.visible {
        color: rgba(201, 169, 78, 0.4);
        transform: translateY(65px);
      }
      .sub-msg.done {
        color: rgba(232, 201, 106, 0.6);
        transform: translateY(65px);
      }
    </style>
  </head>
  <body>
    <canvas id="cv"></canvas>
    <div class="text-layer">
      <div class="msg" id="msg">
        당신의 인연을 매칭하는 중<span class="dots" id="dots"></span>
      </div>
      <div class="sub-msg" id="sub">Noble Hong Premium Matching</div>
    </div>

    <script>
      const cv = document.getElementById("cv");
      const c = cv.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      let W, H, cx, cy;

      function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        cv.width = W * dpr;
        cv.height = H * dpr;
        c.scale(dpr, dpr);
        // Reset scale on each resize
        cv.style.width = W + "px";
        cv.style.height = H + "px";
        cx = W / 2;
        cy = H / 2;
      }
      resize();
      window.addEventListener("resize", () => {
        c.setTransform(1, 0, 0, 1, 0, 0);
        resize();
      });

      const G = "#c9a94e",
        G3 = "#e8c96a";

      function glow(color, blur) {
        c.shadowColor = color;
        c.shadowBlur = blur;
      }
      function noGlow() {
        c.shadowBlur = 0;
      }
      function smoothstep(x) {
        return x * x * (3 - 2 * x);
      }
      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      // ---- State Machine ----
      // Phase 0: Orbiting (0-6s) — two particles orbit on separate ellipses
      // Phase 1: Approaching (6-9s) — orbits shrink, particles approach
      // Phase 2: Meeting (9-10.5s) — particles touch, spark flash
      // Phase 3: Merge glow (10.5-12s) — single bright orb, radial burst, text change
      // Phase 4: Settled (12-14s) — calm glow, "매칭 완료"
      // Then loop

      const CYCLE = 14;
      let t = 0;
      let lastTime = performance.now();

      // Trail history
      const trail1 = [],
        trail2 = [];
      const TRAIL_MAX = 50;

      // Ambient particles
      const ambients = [];
      for (let i = 0; i < 30; i++) {
        ambients.push({
          x: Math.random() * 2 - 1,
          y: Math.random() * 2 - 1,
          vx: (Math.random() - 0.5) * 0.2,
          vy: (Math.random() - 0.5) * 0.2,
          size: 0.5 + Math.random() * 1.5,
          phase: Math.random() * Math.PI * 2,
        });
      }

      // Dot animation for text
      const dotsEl = document.getElementById("dots");
      const msgEl = document.getElementById("msg");
      const subEl = document.getElementById("sub");
      let dotCount = 0;
      setInterval(() => {
        dotCount = (dotCount + 1) % 4;
        dotsEl.textContent = ".".repeat(dotCount);
      }, 500);

      function getPhase(time) {
        if (time < 6) return { id: 0, local: time / 6 };
        if (time < 9) return { id: 1, local: (time - 6) / 3 };
        if (time < 10.5) return { id: 2, local: (time - 9) / 1.5 };
        if (time < 12) return { id: 3, local: (time - 10.5) / 1.5 };
        return { id: 4, local: (time - 12) / 2 };
      }

      function draw(now) {
        const dt = Math.min(50, now - lastTime) / 1000;
        lastTime = now;
        t += dt;
        const loopT = t % CYCLE;
        const phase = getPhase(loopT);

        c.clearRect(0, 0, W, H);

        // ---- Background ambient particles ----
        ambients.forEach((p) => {
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          if (Math.abs(p.x) > 1.2) p.vx *= -1;
          if (Math.abs(p.y) > 1.2) p.vy *= -1;
          const px = cx + p.x * cx * 0.8;
          const py = cy + p.y * cy * 0.8;
          const twinkle = 0.3 + Math.sin(t * 2 + p.phase) * 0.3;
          c.beginPath();
          c.arc(px, py, p.size, 0, Math.PI * 2);
          c.fillStyle = `rgba(201,169,78,${twinkle * 0.08})`;
          c.fill();
        });

        // ---- Orbit parameters ----
        let R1, R2, tilt1, tilt2, speed1, speed2;
        const baseR = Math.min(W, H) * 0.18;

        if (phase.id === 0) {
          // Steady orbiting
          R1 = baseR;
          R2 = baseR;
          tilt1 = 0.35;
          tilt2 = -0.35;
          speed1 = 1.8;
          speed2 = 1.8;
        } else if (phase.id === 1) {
          // Approaching
          const e = smoothstep(phase.local);
          R1 = lerp(baseR, baseR * 0.25, e);
          R2 = lerp(baseR, baseR * 0.25, e);
          tilt1 = lerp(0.35, 0.1, e);
          tilt2 = lerp(-0.35, -0.1, e);
          speed1 = lerp(1.8, 2.5, e);
          speed2 = lerp(1.8, 2.5, e);
        } else if (phase.id === 2) {
          // Meeting — very close
          const e = smoothstep(phase.local);
          R1 = lerp(baseR * 0.25, baseR * 0.05, e);
          R2 = lerp(baseR * 0.25, baseR * 0.05, e);
          tilt1 = 0.1;
          tilt2 = -0.1;
          speed1 = lerp(2.5, 3.5, e);
          speed2 = lerp(2.5, 3.5, e);
        } else {
          R1 = 0;
          R2 = 0;
          tilt1 = 0;
          tilt2 = 0;
          speed1 = 0;
          speed2 = 0;
        }

        // ---- Orbit paths (dim) ----
        if (phase.id <= 2) {
          const pathAlpha = phase.id === 2 ? 0.06 * (1 - phase.local) : 0.06;
          // Path 1
          c.beginPath();
          for (let i = 0; i <= 100; i++) {
            const a = (i / 100) * Math.PI * 2;
            const px = cx + Math.cos(a) * R1;
            const py =
              cy +
              Math.sin(a) * R1 * 0.4 * Math.cos(tilt1) +
              Math.cos(a) * R1 * 0.1 * Math.sin(tilt1);
            if (i === 0) c.moveTo(px, py);
            else c.lineTo(px, py);
          }
          c.closePath();
          c.strokeStyle = `rgba(201,169,78,${pathAlpha})`;
          c.lineWidth = 1;
          c.stroke();
          // Path 2
          c.beginPath();
          for (let i = 0; i <= 100; i++) {
            const a = (i / 100) * Math.PI * 2;
            const px = cx + Math.cos(a) * R2 * Math.cos(tilt2 * 2);
            const py = cy + Math.sin(a) * R2 * 0.4;
            if (i === 0) c.moveTo(px, py);
            else c.lineTo(px, py);
          }
          c.closePath();
          c.strokeStyle = `rgba(201,169,78,${pathAlpha})`;
          c.stroke();
        }

        // ---- Orbital bodies ----
        if (phase.id <= 2) {
          const a1 = t * speed1;
          const a2 = t * speed2 + Math.PI;
          const x1 = cx + Math.cos(a1) * R1;
          const y1 =
            cy +
            Math.sin(a1) * R1 * 0.4 * Math.cos(tilt1) +
            Math.cos(a1) * R1 * 0.1 * Math.sin(tilt1);
          const x2 = cx + Math.cos(a2) * R2 * Math.cos(tilt2 * 2);
          const y2 = cy + Math.sin(a2) * R2 * 0.4;

          // Store trail
          trail1.push({ x: x1, y: y1 });
          if (trail1.length > TRAIL_MAX) trail1.shift();
          trail2.push({ x: x2, y: y2 });
          if (trail2.length > TRAIL_MAX) trail2.shift();

          // Draw trails
          trail1.forEach((p, i) => {
            const a = i / trail1.length;
            c.beginPath();
            c.arc(p.x, p.y, 3 * a, 0, Math.PI * 2);
            c.fillStyle = `rgba(201,169,78,${a * 0.35})`;
            c.fill();
          });
          trail2.forEach((p, i) => {
            const a = i / trail2.length;
            c.beginPath();
            c.arc(p.x, p.y, 3 * a, 0, Math.PI * 2);
            c.fillStyle = `rgba(232,201,106,${a * 0.35})`;
            c.fill();
          });

          // Body 1
          const bodySize =
            phase.id === 2 ? lerp(6, 8, smoothstep(phase.local)) : 6;
          c.beginPath();
          c.arc(x1, y1, bodySize, 0, Math.PI * 2);
          glow("rgba(201,169,78,.6)", 20);
          c.fillStyle = "rgba(201,169,78,.9)";
          c.fill();
          noGlow();
          // Inner bright core
          c.beginPath();
          c.arc(x1, y1, bodySize * 0.4, 0, Math.PI * 2);
          c.fillStyle = "rgba(255,240,200,.8)";
          c.fill();

          // Body 2
          c.beginPath();
          c.arc(x2, y2, bodySize, 0, Math.PI * 2);
          glow("rgba(232,201,106,.6)", 20);
          c.fillStyle = "rgba(232,201,106,.9)";
          c.fill();
          noGlow();
          c.beginPath();
          c.arc(x2, y2, bodySize * 0.4, 0, Math.PI * 2);
          c.fillStyle = "rgba(255,245,210,.8)";
          c.fill();

          // Connection line when close
          const dist = Math.hypot(x1 - x2, y1 - y2);
          if (dist < baseR * 0.6) {
            const strength = 1 - dist / (baseR * 0.6);
            c.beginPath();
            c.moveTo(x1, y1);
            c.lineTo(x2, y2);
            glow(`rgba(232,201,106,${strength * 0.3})`, 8);
            c.strokeStyle = `rgba(232,201,106,${strength * 0.5})`;
            c.lineWidth = 1 + strength * 2;
            c.stroke();
            noGlow();
          }

          // Spark shower at meeting
          if (phase.id === 2 && phase.local > 0.5) {
            const sp = (phase.local - 0.5) / 0.5;
            const meetX = (x1 + x2) / 2,
              meetY = (y1 + y2) / 2;
            for (let i = 0; i < 16; i++) {
              const sa = (i * Math.PI) / 8 + t * 5;
              const sd = sp * 35 + Math.sin(t * 8 + i) * 5;
              const sz = 2 * (1 - sp * 0.5);
              c.beginPath();
              c.arc(
                meetX + Math.cos(sa) * sd,
                meetY + Math.sin(sa) * sd,
                sz,
                0,
                Math.PI * 2,
              );
              glow("rgba(232,201,106,.3)", 4);
              c.fillStyle = `rgba(232,201,106,${(1 - sp * 0.3) * 0.7})`;
              c.fill();
              noGlow();
            }
          }
        }

        // ---- Phase 3: Merge Glow ----
        if (phase.id === 3) {
          trail1.length = 0;
          trail2.length = 0;
          const e = smoothstep(phase.local);

          // Central orb growing + brightening
          const orbR = lerp(8, 20, e);
          const grd = c.createRadialGradient(cx, cy, 0, cx, cy, orbR * 3);
          grd.addColorStop(0, `rgba(255,245,210,${0.3 + e * 0.4})`);
          grd.addColorStop(0.3, `rgba(232,201,106,${0.2 + e * 0.3})`);
          grd.addColorStop(1, "transparent");
          c.fillStyle = grd;
          c.beginPath();
          c.arc(cx, cy, orbR * 3, 0, Math.PI * 2);
          c.fill();

          // Core
          c.beginPath();
          c.arc(cx, cy, orbR, 0, Math.PI * 2);
          glow("rgba(255,240,200,.8)", 30 + e * 20);
          c.fillStyle = `rgba(255,245,220,${0.7 + e * 0.3})`;
          c.fill();
          noGlow();
          c.beginPath();
          c.arc(cx, cy, orbR * 0.5, 0, Math.PI * 2);
          c.fillStyle = "rgba(255,252,240,.9)";
          c.fill();

          // Radial golden rays
          for (let i = 0; i < 12; i++) {
            const ra = (i * Math.PI) / 6 + t * 0.5;
            const rayLen = (40 + e * 60) * (0.7 + Math.sin(t * 3 + i) * 0.3);
            c.beginPath();
            c.moveTo(cx + Math.cos(ra) * orbR, cy + Math.sin(ra) * orbR);
            c.lineTo(cx + Math.cos(ra) * rayLen, cy + Math.sin(ra) * rayLen);
            c.strokeStyle = `rgba(232,201,106,${(0.1 + e * 0.15) * (0.5 + Math.sin(t * 4 + i) * 0.5)})`;
            c.lineWidth = 1.5;
            c.stroke();
          }

          // Expanding ring
          const ringR = orbR + e * 80;
          c.beginPath();
          c.arc(cx, cy, ringR, 0, Math.PI * 2);
          c.strokeStyle = `rgba(201,169,78,${(1 - e) * 0.3})`;
          c.lineWidth = 1.5;
          c.stroke();

          // Scattered sparkles
          for (let i = 0; i < 20; i++) {
            const sa = (i * Math.PI) / 10 + e * 2;
            const sd = orbR + e * 50 + Math.sin(t * 4 + i) * 10;
            const sz = 1.5 * (1 - e * 0.3);
            c.beginPath();
            c.arc(
              cx + Math.cos(sa) * sd,
              cy + Math.sin(sa) * sd,
              sz,
              0,
              Math.PI * 2,
            );
            c.fillStyle = `rgba(232,201,106,${(1 - e * 0.5) * 0.5})`;
            c.fill();
          }

          // Full screen warm flash at peak
          if (e > 0.7) {
            const flash = (e - 0.7) / 0.3;
            const fgrd = c.createRadialGradient(
              cx,
              cy,
              0,
              cx,
              cy,
              Math.max(W, H) * 0.6,
            );
            fgrd.addColorStop(0, `rgba(232,201,106,${flash * 0.06})`);
            fgrd.addColorStop(1, "transparent");
            c.fillStyle = fgrd;
            c.fillRect(0, 0, W, H);
          }
        }

        // ---- Phase 4: Settled warm glow ----
        if (phase.id === 4) {
          const e = smoothstep(Math.min(1, phase.local * 2));
          const pulse = 0.5 + Math.sin(t * 2) * 0.1;

          // Soft ambient glow
          const grd = c.createRadialGradient(cx, cy, 0, cx, cy, 60);
          grd.addColorStop(0, `rgba(255,245,210,${0.15 * pulse})`);
          grd.addColorStop(0.5, `rgba(232,201,106,${0.08 * pulse})`);
          grd.addColorStop(1, "transparent");
          c.fillStyle = grd;
          c.beginPath();
          c.arc(cx, cy, 60, 0, Math.PI * 2);
          c.fill();

          // Settled orb
          const orbR = 14 + Math.sin(t * 1.5) * 2;
          c.beginPath();
          c.arc(cx, cy, orbR, 0, Math.PI * 2);
          glow("rgba(232,201,106,.5)", 25);
          c.fillStyle = "rgba(255,245,220,.7)";
          c.fill();
          noGlow();
          c.beginPath();
          c.arc(cx, cy, orbR * 0.4, 0, Math.PI * 2);
          c.fillStyle = "rgba(255,252,240,.85)";
          c.fill();

          // Gentle rotating sparkle ring
          for (let i = 0; i < 8; i++) {
            const a = t * 0.8 + (i * Math.PI) / 4;
            const d = orbR + 12 + Math.sin(t * 2 + i) * 3;
            c.beginPath();
            c.arc(
              cx + Math.cos(a) * d,
              cy + Math.sin(a) * d,
              1.2,
              0,
              Math.PI * 2,
            );
            c.fillStyle = `rgba(201,169,78,${0.25 * pulse})`;
            c.fill();
          }
        }

        // ---- Text transitions ----
        if (phase.id <= 1) {
          msgEl.className = "msg visible";
          msgEl.innerHTML =
            '당신의 인연을 매칭하는 중<span class="dots" id="dots"></span>';
          subEl.className = "sub-msg visible";
          subEl.textContent = "Noble Hong Premium Matching";
        } else if (phase.id === 2) {
          msgEl.className = "msg visible";
          msgEl.innerHTML =
            '최적의 인연을 찾고 있습니다<span class="dots" id="dots"></span>';
        } else if (phase.id === 3) {
          if (phase.local > 0.5) {
            msgEl.className = "msg done";
            msgEl.innerHTML = "인연이 연결되었습니다";
            subEl.className = "sub-msg done";
            subEl.textContent = "Your Match is Ready";
          }
        } else if (phase.id === 4) {
          msgEl.className = "msg done";
          msgEl.innerHTML = "인연이 연결되었습니다";
          subEl.className = "sub-msg done";
          subEl.textContent = "Your Match is Ready";
          // Reset for loop
          if (phase.local > 0.9) {
            msgEl.className = "msg";
            subEl.className = "sub-msg";
          }
        }

        requestAnimationFrame(draw);
      }

      requestAnimationFrame(draw);
    </script>
  </body>
</html>
