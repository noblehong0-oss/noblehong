      .footer-links a:hover {

      .footer-copy {

        .detail-layout {

          padding-right: 20px;
        }
        .detail-nav {
          grid-template-columns: 1fr;

          display: none;

  <body>
    <!-- ====== LOADING OVERLAY (self-contained) ====== -->
    <div
      id="loading-overlay"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 9999;
        background: #0d0b08;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.6s ease;
      "
    >
      <canvas
        id="loading-cv"
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%"
      ></canvas>
      <div
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          pointer-events: none;
          z-index: 2;
        "
      >
        <div
          id="loading-msg"
          style="
            font-family: &quot;Noto Serif KR&quot;, serif;
            font-size: 18px;
            font-weight: 300;
            color: #3d3425;
            letter-spacing: 4px;
            transform: translateY(55px);
          "
        >
          당신의 인연을 매칭하는 중<span
            id="loading-dots"
            style="
              display: inline-block;
              width: 2em;
              text-align: left;
              letter-spacing: 2px;
            "
          ></span>
        </div>
        <div
          style="
            font-family: &quot;Cormorant Garamond&quot;, serif;
            font-size: 14px;
            font-weight: 400;
            color: rgba(140, 112, 48, 0.9);
            letter-spacing: 6px;
            text-transform: uppercase;
            transform: translateY(65px);
            margin-top: 8px;
          "
        >
          Noble Hong Premium Matching
        </div>
      </div>
      <script>
        (function () {
          var overlay = document.getElementById("loading-overlay");
          var cv = document.getElementById("loading-cv");
          var ctx = cv.getContext("2d");
          var dpr = window.devicePixelRatio || 1;
          var W, H, cxL, cyL;
          function rs() {
            W = window.innerWidth;
            H = window.innerHeight;
            cv.width = W * dpr;
            cv.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            cv.style.width = W + "px";
            cv.style.height = H + "px";
            cxL = W / 2;
            cyL = H / 2;
          }
          rs();
          window.addEventListener("resize", function () {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            rs();
          });
          var dotsEl = document.getElementById("loading-dots");
          var dc = 0;
          var dotIv = setInterval(function () {
            dc = (dc + 1) % 4;
            dotsEl.textContent = ".".repeat(dc);
          }, 500);
          var ambients = [];
          for (var i = 0; i < 30; i++) {
            ambients.push({
              x: Math.random() * 2 - 1,
              y: Math.random() * 2 - 1,
              vx: (Math.random() - 0.5) * 0.2,
              vy: (Math.random() - 0.5) * 0.2,
              size: 0.5 + Math.random() * 1.5,
              phase: Math.random() * Math.PI * 2,
            });
          }
          var trail1 = [],
            trail2 = [],
            TRAIL_MAX = 50;
          var t = 0,
            lastTime = performance.now(),
            stopped = false;
          function glow(co, bl) {
            ctx.shadowColor = co;
            ctx.shadowBlur = bl;
          }
          function noGlow() {
            ctx.shadowBlur = 0;
          }
          function sm(x) {
            return x * x * (3 - 2 * x);
          }
          function lerp(a, b, t) {
            return a + (b - a) * t;
          }
          function getPhase(time) {
            if (time < 6) return { id: 0, local: time / 6 };
            if (time < 9) return { id: 1, local: (time - 6) / 3 };
            if (time < 10.5) return { id: 2, local: (time - 9) / 1.5 };
            if (time < 12) return { id: 3, local: (time - 10.5) / 1.5 };
            return { id: 4, local: (time - 12) / 2 };
          }
          function draw(now) {
            if (stopped) return;
            var dt = Math.min(50, now - lastTime) / 1000;
            lastTime = now;
            t += dt;
            var loopT = t % 14,
              phase = getPhase(loopT);
            ctx.clearRect(0, 0, W, H);
            ambients.forEach(function (p) {
              p.x += p.vx * dt;
              p.y += p.vy * dt;
              if (Math.abs(p.x) > 1.2) p.vx *= -1;
              if (Math.abs(p.y) > 1.2) p.vy *= -1;
              var px = cxL + p.x * cxL * 0.8,
                py = cyL + p.y * cyL * 0.8,
                tw = 0.3 + Math.sin(t * 2 + p.phase) * 0.3;
              ctx.beginPath();
              ctx.arc(px, py, p.size, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(201,169,78," + tw * 0.08 + ")";
              ctx.fill();
            });
            var baseR = Math.min(W, H) * 0.18,
              R1,
              R2,
              tilt1,
              tilt2,
              spd1,
              spd2;
            if (phase.id === 0) {
              R1 = baseR;
              R2 = baseR;
              tilt1 = 0.35;
              tilt2 = -0.35;
              spd1 = 1.8;
              spd2 = 1.8;
            } else if (phase.id === 1) {
              var e = sm(phase.local);
              R1 = lerp(baseR, baseR * 0.25, e);
              R2 = R1;
              tilt1 = lerp(0.35, 0.1, e);
              tilt2 = lerp(-0.35, -0.1, e);
              spd1 = lerp(1.8, 2.5, e);
              spd2 = spd1;
            } else if (phase.id === 2) {
              var e2 = sm(phase.local);
              R1 = lerp(baseR * 0.25, baseR * 0.05, e2);
              R2 = R1;
              tilt1 = 0.1;
              tilt2 = -0.1;
              spd1 = lerp(2.5, 3.5, e2);
              spd2 = spd1;
            } else {
              R1 = 0;
              R2 = 0;
              tilt1 = 0;
              tilt2 = 0;
              spd1 = 0;
              spd2 = 0;
            }
            if (phase.id <= 2) {
              var pa = phase.id === 2 ? 0.06 * (1 - phase.local) : 0.06;
              ctx.beginPath();
              for (var i = 0; i <= 100; i++) {
                var a = (i / 100) * Math.PI * 2,
                  px = cxL + Math.cos(a) * R1,
                  py =
                    cyL +
                    Math.sin(a) * R1 * 0.4 * Math.cos(tilt1) +
                    Math.cos(a) * R1 * 0.1 * Math.sin(tilt1);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
              }
              ctx.closePath();
              ctx.strokeStyle = "rgba(201,169,78," + pa + ")";
              ctx.lineWidth = 1;
              ctx.stroke();
              ctx.beginPath();
              for (var j = 0; j <= 100; j++) {
                var a2 = (j / 100) * Math.PI * 2,
                  px2 = cxL + Math.cos(a2) * R2 * Math.cos(tilt2 * 2),
                  py2 = cyL + Math.sin(a2) * R2 * 0.4;
                if (j === 0) ctx.moveTo(px2, py2);
                else ctx.lineTo(px2, py2);
              }
              ctx.closePath();
              ctx.strokeStyle = "rgba(201,169,78," + pa + ")";
              ctx.stroke();
              var ang1 = t * spd1,
                ang2 = t * spd2 + Math.PI;
              var x1 = cxL + Math.cos(ang1) * R1,
                y1 =
                  cyL +
                  Math.sin(ang1) * R1 * 0.4 * Math.cos(tilt1) +
                  Math.cos(ang1) * R1 * 0.1 * Math.sin(tilt1);
              var x2 = cxL + Math.cos(ang2) * R2 * Math.cos(tilt2 * 2),
                y2 = cyL + Math.sin(ang2) * R2 * 0.4;
              trail1.push({ x: x1, y: y1 });
              if (trail1.length > TRAIL_MAX) trail1.shift();
              trail2.push({ x: x2, y: y2 });
              if (trail2.length > TRAIL_MAX) trail2.shift();
              trail1.forEach(function (p, i) {
                var al = i / trail1.length;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3 * al, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(201,169,78," + al * 0.35 + ")";
                ctx.fill();
              });
              trail2.forEach(function (p, i) {
                var al = i / trail2.length;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3 * al, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(232,201,106," + al * 0.35 + ")";
                ctx.fill();
              });
              var bs = phase.id === 2 ? lerp(6, 8, sm(phase.local)) : 6;
              ctx.beginPath();
              ctx.arc(x1, y1, bs, 0, Math.PI * 2);
              glow("rgba(201,169,78,.6)", 20);
              ctx.fillStyle = "rgba(201,169,78,.9)";
              ctx.fill();
              noGlow();
              ctx.beginPath();
              ctx.arc(x1, y1, bs * 0.4, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(255,240,200,.8)";
              ctx.fill();
              ctx.beginPath();
              ctx.arc(x2, y2, bs, 0, Math.PI * 2);
              glow("rgba(232,201,106,.6)", 20);
              ctx.fillStyle = "rgba(232,201,106,.9)";
              ctx.fill();
              noGlow();
              ctx.beginPath();
              ctx.arc(x2, y2, bs * 0.4, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(255,245,210,.8)";
              ctx.fill();
              var dist = Math.hypot(x1 - x2, y1 - y2);
              if (dist < baseR * 0.6) {
                var str = 1 - dist / (baseR * 0.6);
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                glow("rgba(232,201,106," + str * 0.3 + ")", 8);
                ctx.strokeStyle = "rgba(232,201,106," + str * 0.5 + ")";
                ctx.lineWidth = 1 + str * 2;
                ctx.stroke();
                noGlow();
              }
              if (phase.id === 2 && phase.local > 0.5) {
                var sp = (phase.local - 0.5) / 0.5,
                  mx = (x1 + x2) / 2,
                  my = (y1 + y2) / 2;
                for (var si = 0; si < 16; si++) {
                  var sa = (si * Math.PI) / 8 + t * 5,
                    sd = sp * 35 + Math.sin(t * 8 + si) * 5,
                    sz = 2 * (1 - sp * 0.5);

                    mx + Math.cos(sa) * sd,

              }

            if (phase.id === 3) {
              trail1.length = 0;
              trail2.length = 0;
              var e3 = sm(phase.local),
                oR = lerp(8, 20, e3);

              grd.addColorStop(0, "rgba(255,245,210," + (0.3 + e3 * 0.4) + ")");

              );

              ctx.fillStyle = grd;
              ctx.beginPath();
              ctx.arc(cxL, cyL, oR * 3, 0, Math.PI * 2);
              ctx.fill();
              ctx.beginPath();
              ctx.arc(cxL, cyL, oR, 0, Math.PI * 2);
              glow("rgba(255,240,200,.8)", 30 + e3 * 20);
              ctx.fillStyle = "rgba(255,245,220," + (0.7 + e3 * 0.3) + ")";
              ctx.fill();
              noGlow();
              ctx.beginPath();
              ctx.arc(cxL, cyL, oR * 0.5, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(255,252,240,.9)";
              ctx.fill();
              for (var ri = 0; ri < 12; ri++) {
                var ra = (ri * Math.PI) / 6 + t * 0.5,
                  rl = (40 + e3 * 60) * (0.7 + Math.sin(t * 3 + ri) * 0.3);
                ctx.beginPath();
                ctx.moveTo(cxL + Math.cos(ra) * oR, cyL + Math.sin(ra) * oR);
                ctx.lineTo(cxL + Math.cos(ra) * rl, cyL + Math.sin(ra) * rl);
                ctx.strokeStyle =
                  "rgba(232,201,106," +
                  (0.1 + e3 * 0.15) * (0.5 + Math.sin(t * 4 + ri) * 0.5) +
                  ")";
                ctx.lineWidth = 1.5;
                ctx.stroke();
              }
              var rR = oR + e3 * 80;
              ctx.beginPath();
              ctx.arc(cxL, cyL, rR, 0, Math.PI * 2);
              ctx.strokeStyle = "rgba(201,169,78," + (1 - e3) * 0.3 + ")";
              ctx.lineWidth = 1.5;
              ctx.stroke();
            }
            if (phase.id === 4) {
              var pu = 0.5 + Math.sin(t * 2) * 0.1;

              grd2.addColorStop(0.5, "rgba(232,201,106," + 0.08 * pu + ")");
              grd2.addColorStop(1, "transparent");
              ctx.fillStyle = grd2;
              ctx.beginPath();
              ctx.arc(cxL, cyL, 60, 0, Math.PI * 2);
              ctx.fill();
              var oR2 = 14 + Math.sin(t * 1.5) * 2;

              ctx.fill();
              noGlow();
              ctx.beginPath();
              ctx.arc(cxL, cyL, oR2 * 0.4, 0, Math.PI * 2);

    <script>
      const DATA_URL = "data/columns.json";

      async function init() {
        const params = new URLSearchParams(location.search);
        const id = parseInt(params.get("id"), 10);
        if (!id) {
          document.getElementById("content").textContent = "잘못된 접근입니다.";
          return;
        }

        const res = await fetch(DATA_URL);
        const columns = await res.json();
        const idx = columns.findIndex((c) => c.id === id);
        if (idx === -1) {
          document.getElementById("content").textContent =
            "칼럼을 찾을 수 없습니다.";
          return;
        }

        const col = columns[idx];
        const prev = idx > 0 ? columns[idx - 1] : null;
        const next = idx < columns.length - 1 ? columns[idx + 1] : null;

        document.title = col.title + " — 러브 칼럼 | 노블홍";

        const bodyHtml = col.body
          .split("\n\n")
          .map((p) => {
            if (p.startsWith("—"))
              return '<div class="detail-quote">' + p + "</div>";
            if (p.startsWith('"') || p.startsWith('"'))
              return '<div class="detail-quote">' + p + "</div>";
            return "<p>" + p + "</p>";
          })
          .join("");

        const relatedHtml = columns
          .filter((c) => c.id !== id)
          .map(
            (c) =>
              '<a href="/column_detail?id=' +
              c.id +
              '">' +
              c.title +
              "</a>",
          )
          .join("");

        let navHtml = '<div class="detail-nav">';
        if (prev) {
          navHtml +=
            '<a class="nav-item prev" href="/column_detail?id=' +
            prev.id +
            '"><div class="nav-label"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 이전 글</div><div class="nav-title">' +
            prev.title +
            "</div></a>";
        } else {
          navHtml += "<div></div>";
        }
        if (next) {
          navHtml +=
            '<a class="nav-item next" href="/column_detail?id=' +
            next.id +
            '"><div class="nav-label">다음 글 <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div><div class="nav-title">' +
            next.title +
            "</div></a>";
        }
        navHtml += "</div>";

        document.getElementById("content").className = "";
        document.getElementById("content").innerHTML =
          '<div class="detail-hero">' +
          '<div class="detail-breadcrumb"><a href="/matchinglounge">차별화 시스템</a><span class="sep">/</span><a href="/matchinglounge#column">러브 칼럼</a><span class="sep">/</span><span>상세</span></div>' +
          '<span class="detail-cat">' +
          col.category +
          "</span>" +
          '<h1 class="detail-title">' +
          col.title +
          "</h1>" +
          '<div class="detail-meta"><span>홍유진 대표</span><span class="dot"></span><span>' +
          (col.source || "노블홍") +
          "</span></div>" +
          "</div>" +
          '<div class="detail-layout">' +
          "<div>" +
          '<div class="detail-img"><img src="' +
          col.image +
          '" alt="' +
          col.title +
          '" /></div>' +
          '<div class="detail-body">' +
          bodyHtml +
          "</div>" +
          navHtml +
          "</div>" +
          '<aside class="detail-sidebar">' +
          '<a href="/matchinglounge#column" class="sidebar-back"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 칼럼 목록</a>' +
          '<div class="sidebar-box"><div class="sidebar-box-title">다른 칼럼</div><div class="sidebar-related">' +
          relatedHtml +
          "</div></div>" +
          '<div class="sidebar-box"><div class="sidebar-box-title">출처</div><div class="sidebar-info-row"><span class="sidebar-info-label">저서</span><span class="sidebar-info-value">당신에게 연애가 어려운 이유</span></div><div class="sidebar-info-row"><span class="sidebar-info-label">저자</span><span class="sidebar-info-value">홍유진</span></div></div>' +
          "</aside>" +
          "</div>";
      }

      init();
    </script>

        var pathname = location.pathname.replace(/\/$/, "");
        var segment = pathname.split("/").pop() || "index";
        segment = segment.replace(/\.html$/, "");
        if (pathname === "" || pathname === "/") segment = "index";
        document.querySelectorAll(".gnb-menu a").forEach(function (a) {

          var hrefSeg = href.split("#")[0].split("?")[0].split("/").pop().replace(/\.html$/, "");
          if (hrefSeg === "" && href.indexOf("/") === 0) hrefSeg = "index";
