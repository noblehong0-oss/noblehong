    <script>
      (async function () {
        const API = "https://noblehong-api.noblehong0.workers.dev";
        const params = new URLSearchParams(location.search);
        const rawId = params.get("id") || "";

        // 1) D1 우선: /api/content?module=notice → 클라이언트에서 ID 매칭
        async function loadFromD1() {
          try {
            const r = await fetch(API + "/api/content?module=notice&limit=50");
            const d = await r.json();
            if (!d.ok || !Array.isArray(d.records)) return null;
            // D1 shape → 공통 shape 정규화 (게시일 내림차순)
            const items = d.records
              .map((rec) => {
                const f = rec.fields || {};
                return {
                  id: rec.id,
                  title: f["제목"] || "",
                  body: f["본문"] || "",
                  date: f["게시일"] || "",
                  category: f["카테고리"] || "공지",
                  source: f["출처"] || "",
                };
              })
              .sort((a, b) => (a.date < b.date ? 1 : -1));
            return items;
          } catch (e) {
            return null;
          }
        }

        // 2) Fallback: data/news.json (D1 실패 또는 ID 매칭 실패 시)
        async function loadFromJson() {
          try {
            const r = await fetch("data/news.json");
            const arr = await r.json();
            return arr.map((n) => ({
              id: String(n.id),
              title: n.title || "",
              body: n.body || "",
              date: n.date || "",
              category: n.category || "소식",
              source: n.source || "",
            }));
          } catch (e) {
            return [];
          }
        }

        let news = await loadFromD1();
        let usedD1 = !!news;
        if (!news || !news.length) {
          news = await loadFromJson();
          usedD1 = false;
        }

        if (!news.length) {
          document.getElementById("content").textContent =
            "소식을 불러올 수 없습니다.";
          return;
        }

        // ID 매칭 — D1(rec...) 또는 news.json(숫자) 둘 다 시도
        let idx = -1;
        if (rawId) {
          idx = news.findIndex((n) => String(n.id) === rawId);
          // D1 첫 시도 실패 → news.json 폴백 한 번 더
          if (idx < 0 && usedD1) {
            const jsonNews = await loadFromJson();
            const jIdx = jsonNews.findIndex((n) => String(n.id) === rawId);
            if (jIdx >= 0) {
              news = jsonNews;
              idx = jIdx;
              usedD1 = false;
            }
          }
        }
        if (idx < 0) idx = 0; // ID 없거나 매칭 실패 시 최신글

        const item = news[idx];
        if (!item) {
          document.getElementById("content").textContent =
            "소식을 찾을 수 없습니다.";
          return;
        }
        const prev = idx > 0 ? news[idx - 1] : null;
        const next = idx < news.length - 1 ? news[idx + 1] : null;

        document.title = item.title + " — 노블홍 소식";

        const bodyHtml =
          item.body.split("\\n\\n").length > 1
            ? item.body
                .split("\\n\\n")
                .map((p) => "<p>" + p.replace(/\\n/g, "<br>") + "</p>")
                .join("")
            : item.body
                .split("\n\n")
                .map((p) => "<p>" + p.replace(/\n/g, "<br>") + "</p>")
                .join("");

        const relatedHtml = news
          .filter((n) => n.id !== item.id)
          .slice(0, 3)
          .map(
            (n) =>
              '<a href="news_detail.html?id=' +
              n.id +
              '">' +
              n.title +
              '<div class="r-date">' +
              n.date +
              "</div></a>",
          )
          .join("");

        let navHtml = '<div class="detail-nav">';
        if (prev)
          navHtml +=
            '<a class="nav-item prev" href="news_detail.html?id=' +
            prev.id +
            '"><div class="nav-label">&larr; 이전 글</div><div class="nav-title">' +
            prev.title +
            "</div></a>";
        else navHtml += "<div></div>";
        if (next)
          navHtml +=
            '<a class="nav-item next" href="news_detail.html?id=' +
            next.id +
            '"><div class="nav-label">다음 글 &rarr;</div><div class="nav-title">' +
            next.title +
            "</div></a>";
        navHtml += "</div>";

        document.getElementById("content").style = "";
        document.getElementById("content").innerHTML =
          '<div class="detail-hero">' +
          '<div class="detail-breadcrumb"><a href="/matchinglounge">매칭라운지</a><span class="sep">/</span><a href="/matchinglounge#feed">노블홍 소식</a><span class="sep">/</span><span>상세</span></div>' +
          '<span class="detail-cat">' +
          (item.category || "소식") +
          "</span>" +
          '<h1 class="detail-title">' +
          item.title +
          "</h1>" +
          '<div class="detail-meta"><span>' +
          item.date +
          '</span><span class="dot"></span><span>' +
          (item.source || "노블홍") +
          "</span></div>" +
          "</div>" +
          '<div class="detail-layout">' +
          '<div class="detail-main">' +
          '<div class="detail-body">' +
          bodyHtml +
          "</div>" +
          navHtml +
          "</div>" +
          '<aside class="detail-sidebar">' +
          '<div class="sidebar-box"><div class="sidebar-box-title">글 정보</div>' +
          '<div class="sidebar-info-row"><span class="sidebar-info-label">카테고리</span><span class="sidebar-info-value">' +
          (item.category || "소식") +
          "</span></div>" +
          '<div class="sidebar-info-row"><span class="sidebar-info-label">작성일</span><span class="sidebar-info-value">' +
          item.date +
          "</span></div>" +
          (item.source
            ? '<div class="sidebar-info-row"><span class="sidebar-info-label">출처</span><span class="sidebar-info-value">' +
              item.source +
              "</span></div>"
            : "") +
          "</div>" +
          '<div class="sidebar-box"><div class="sidebar-box-title">관련 소식</div><div class="sidebar-related">' +
          relatedHtml +
          "</div></div>" +
          '<a href="/matchinglounge#feed" class="sidebar-back">&larr; 목록으로 돌아가기</a>' +
          "</aside>" +
          "</div>";
      })();
    </script>

    <!-- GNB scroll 효과 (프로덕션 동일) -->
    <script>
      (function () {
        var gnb = document.getElementById("gnb");
        if (!gnb) return;
        window.addEventListener("scroll", function () {
          gnb.classList.toggle("scrolled", window.scrollY > 50);
        });
      })();
    </script>

    <!-- GNB_ACTIVE_JS -->
    <script>
      (function () {
        var pathname = location.pathname.replace(/\/$/, "");
        var segment = pathname.split("/").pop() || "index";
        segment = segment.replace(/\.html$/, "");
        if (pathname === "" || pathname === "/") segment = "index";
        document.querySelectorAll(".gnb-menu a").forEach(function (a) {
          var href = a.getAttribute("href") || "";
          var hrefSeg = href
            .split("#")[0]
            .split("?")[0]
            .split("/")
            .pop()
            .replace(/\.html$/, "");
          if (hrefSeg === "" && href.indexOf("/") === 0) hrefSeg = "index";
          if (hrefSeg === segment) a.classList.add("active");
        });
      })();
    </script>
  </body>
</html>
