    />

    <style>
      :root {
        --bg: #fffefb;
        --surface: #ffffff;
        --surface-warm: #f9f6ef;
        --surface-cream: #f2ece0;
        --border: #e8e0ce;
        --border-gold: rgba(184, 154, 90, 0.25);
        --text: #2c2820;
        --text-secondary: #5c5040;
        --text-muted: #8c8070;
        --gold: #b89a5a;
        --gold-light: #d4b870;
        --gold-dark: #8c7030;
        --gold-bg: rgba(184, 154, 90, 0.04);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Pretendard Variable", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.7;
      }

      /* ===== 페이지 헤더 ===== */
      .page-header {
        text-align: center;
        padding: 60px 20px 40px;
        background: var(--surface-warm);
        border-bottom: 1px solid var(--border);
      }
      .page-header .ornament {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin-bottom: 16px;
      }
      .page-header .ornament::before,
      .page-header .ornament::after {
        content: "";
        width: 40px;
        height: 1px;
        background: var(--gold-light);
      }
      .page-header .ornament span {
        font-family: "Cormorant Garamond", serif;
        font-size: 13px;
        color: var(--gold);
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      .page-header h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .page-header p {
        font-size: 15px;
        color: var(--text-secondary);
      }

      /* ===== 검색 영역 ===== */
      .search-area {
        max-width: 560px;
        margin: -24px auto 40px;
        padding: 0 20px;
        position: relative;
        z-index: 2;
      }
      .search-card {
        background: var(--surface);
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        padding: 24px;
      }
      .search-card label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 10px;
        letter-spacing: 0.5px;
      }
      .search-row {
        display: flex;
        gap: 10px;
      }
      .search-row input {
        flex: 1;
        padding: 14px 18px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-size: 15px;
        font-family: inherit;
        background: var(--surface-warm);
        transition:
          border-color 0.3s,
          background 0.3s;
      }
      .search-row input:focus {
        outline: none;
        border-color: var(--gold);
        background: #fff;
      }
      .search-row button {
        padding: 14px 32px;
        background: var(--gold);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.3s;
        white-space: nowrap;
      }
      .search-row button:hover {
        background: var(--gold-dark);
      }

      /* ===== 결과 영역 ===== */
      .result-area {
        max-width: 820px;
        margin: 0 auto 60px;
        padding: 0 20px;
      }

      /* 결과 없음 */
      .no-result {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
        display: none;
      }
      .no-result .icon {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.4;
      }
      .no-result p {
        font-size: 15px;
      }

      /* ===== 프로필 카드 ===== */
      .profile-card {
        background: var(--surface);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
      }
      .profile-hero {
        display: flex;
      }
      .profile-photo {
        width: 300px;
        min-height: 380px;
        background: linear-gradient(145deg, #e8e0d0, #d5cab5);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 13px;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
      }
      .profile-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .profile-main {
        flex: 1;
        padding: 36px 32px 32px;
        display: flex;
        flex-direction: column;
      }

      /* 뱃지 */
      .profile-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 14px;
        background: var(--gold);
        color: #fff;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        width: fit-content;
        margin-bottom: 14px;
      }

      /* 이름/직함 */
      .profile-name {
        font-size: 30px;
        font-weight: 700;
        margin-bottom: 4px;
        letter-spacing: -0.5px;
      }
      .profile-role {
        font-size: 15px;
        color: var(--gold);
        font-weight: 600;
        margin-bottom: 20px;
      }
      .profile-divider {
        width: 36px;
        height: 2px;
        background: linear-gradient(to right, var(--gold), var(--gold-light));
        margin-bottom: 20px;
      }

      /* ===== 탭 ===== */
      .profile-tabs {
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--border);
        margin-bottom: 20px;
      }
      .profile-tabs button {
        padding: 10px 18px;
        background: none;
        border: none;
        border-bottom: 2.5px solid transparent;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.25s;
        font-family: inherit;
      }
      .profile-tabs button:hover {
        color: var(--text-secondary);
      }
      .profile-tabs button.active {
        color: var(--gold-dark);
        border-bottom-color: var(--gold);
      }

      /* 탭 콘텐츠 */
      .tab-content {
        display: none;
        font-size: 14px;
        color: var(--text-secondary);
        line-height: 2;
        flex: 1;
        animation: fadeIn 0.3s ease;
      }
      .tab-content.active {
        display: block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tab-content .section-label {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 6px;
        margin-top: 16px;
      }
      .tab-content .section-label:first-child {
        margin-top: 0;
      }

      /* ===== 시연 스위처 ===== */
      .demo-bar {
        max-width: 820px;
        margin: 0 auto 20px;
        padding: 0 20px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .demo-bar button {
        padding: 8px 18px;
        border: 1.5px solid var(--border);
        background: var(--surface);
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
      }
      .demo-bar button:hover {
        border-color: var(--gold);
        color: var(--gold-dark);
      }
      .demo-bar button.active {
        background: var(--gold);
        border-color: var(--gold);
        color: #fff;
      }
      .demo-label {
        font-size: 12px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        margin-right: 8px;
      }

      /* ===== 반응형 ===== */
      @media (max-width: 768px) {
        .profile-hero {
          flex-direction: column;
        }
        .profile-photo {
          width: 100%;
          min-height: 300px;
        }
        .profile-main {
          padding: 28px 24px;
        }
        .profile-name {
          font-size: 24px;
        }
        .page-header {
          padding: 40px 20px 32px;
        }
        .page-header h1 {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ===== 페이지 헤더 ===== -->
    <div class="page-header">
      <div class="ornament"><span>Couple Manager</span></div>
      <h1>커플매니저</h1>
      <p>10년 이상 경력 커플매니저의 맞춤 상담 및 매칭</p>
    </div>

    <!-- ===== 검색 ===== -->
    <div class="search-area">
      <div class="search-card">
        <label
          >담당 매니저의 이름을 입력하시면 이력을 확인하실 수 있습니다.</label
        >
        <div class="search-row">
          <input
            id="searchInput"
            type="text"
            placeholder="커플매니저 이름 입력"
          />
          <button onclick="doSearch()">검색하기</button>
        </div>
      </div>
    </div>

    <!-- ===== 시연용: 데이터 스위처 ===== -->
    <div class="demo-bar">
      <span class="demo-label">시연 데이터 ▸</span>
      <button class="active" onclick="loadProfile('ceo')">
        홍유진 (CEO, 전체 탭)
      </button>
      <button onclick="loadProfile('senior')">김○○ (경력만)</button>
      <button onclick="loadProfile('junior')">이○○ (경력+이력)</button>
      <button onclick="loadProfile('none')">검색 결과 없음</button>
    </div>

    <!-- ===== 결과 영역 ===== -->
    <div class="result-area">
      <!-- 결과 없음 -->
      <div class="no-result" id="noResult">
        <div class="icon">🔍</div>
        <p>검색 결과가 없습니다.<br />정확한 이름을 입력해 주세요.</p>
      </div>

      <!-- 프로필 카드 -->
      <div class="profile-card" id="profileCard">
        <div class="profile-hero">
          <div class="profile-photo" id="profilePhoto">PHOTO</div>
          <div class="profile-main">
            <div class="profile-badge" id="profileBadge">CEO</div>
            <div class="profile-name" id="profileName">홍유진</div>
            <div class="profile-role" id="profileRole">
              대한민국 커플매니저 제1호
            </div>
            <div class="profile-divider"></div>

            <!-- 탭 (데이터 있는 것만 표시) -->
            <div class="profile-tabs" id="profileTabs"></div>

            <!-- 경력 -->
            <div class="tab-content" id="tab-career"></div>
            <!-- 이력사항 -->
            <div class="tab-content" id="tab-history"></div>
            <!-- 학위·저서 -->
            <div class="tab-content" id="tab-edu"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      /* ===== 시연용 데이터 ===== */
      var profiles = {
        ceo: {
          badge: "CEO · 대한민국 커플매니저 제1호",
          name: "홍유진",
          role: "대한민국 커플매니저 제1호",
          career: [
            "2020.08 ~ 노블홍 대표이사",
            "2020.03 ~ 2020.07 좋은느낌 동행 대표",
            "2016.09 ~ 매칭전략연구소 대표",
            "2012.08 ~ 2016.08 대명위드원 결혼부문 대표",
            "더원결혼정보 부대표, 행복출발 더원 부대표",
            "2010.01 ~ 2012.06 바로연 총괄이사",
            "2009.01 ~ 2010.04 레드힐스 본부장",
            "2004.06 ~ 2008.12 닥스클럽 총괄팀장",
            "1997.05 ~ 2004.05 듀오 총괄팀장",
          ],
          history: [
            "대한민국 커플매니저 1호 (직업사전 등록기준)",
            "매칭전략연구소 대표 (결혼/연애/인문학부문)",
            "연세대학교 행정대학원 총동창회 부회장",
            "사단법인 연세사회복지회 법인이사",
            "사단법인 한국결혼상담협회 이사",
          ],
          edu: {
            degree: [
              "Ph.D 자연치유학 박사",
              "박사논문: 명상음악 프로그램이 커플매니저의 직무스트레스에 미치는 영향",
              "석사: 연세대학교 행정대학원 사회복지학",
              "석사논문: 초혼과 재혼의 결혼조건 차이와 미래 가족관에 대한 연구",
            ],
            books: [
              "『당신에게 연애가 어려운 이유』 (2015)",
              "『국가 소멸 위기의 저출산문제 해결방안』 공동저서 (2024)",
            ],
          },
        },
        senior: {
          badge: "수석 매니저",
          name: "김○○",
          role: "수석 커플매니저 · 20년 경력",
          career: [
            "2015 ~ 노블홍 수석 매니저",
            "2005 ~ 2015 듀오 선임 매니저",
            "전문직(의사/변호사/회계사) 매칭 전담",
            "연간 200쌍 이상 미팅 주선",
          ],
          history: null,
          edu: null,
        },
        junior: {
          badge: "선임 매니저",
          name: "이○○",
          role: "선임 커플매니저 · 15년 경력",
          career: [
            "2018 ~ 노블홍 선임 매니저",
            "2011 ~ 2018 결혼정보회사 매니저",
            "재혼 전문 매칭 컨설팅",
            "50~60대 황혼 재혼 전담",
          ],
          history: ["부모님 상담 동행 서비스 전문", "자녀결혼 컨설팅 담당"],
          edu: null,
        },
      };

      function loadProfile(key) {
        // 데모 버튼 활성화
        document.querySelectorAll(".demo-bar button").forEach(function (b) {
          b.classList.remove("active");
        });
        event.target.classList.add("active");

        var card = document.getElementById("profileCard");
        var noResult = document.getElementById("noResult");

        if (key === "none") {
          card.style.display = "none";
          noResult.style.display = "block";
          return;
        }

        card.style.display = "block";
        noResult.style.display = "none";

        var d = profiles[key];

        document.getElementById("profileBadge").textContent = d.badge;
        document.getElementById("profileName").textContent = d.name;
        document.getElementById("profileRole").textContent = d.role;

        // 탭 생성 (데이터 있는 것만)
        var tabsEl = document.getElementById("profileTabs");
        tabsEl.innerHTML = "";

        var tabDefs = [];
        if (d.career) tabDefs.push({ id: "career", label: "경력" });
        if (d.history) tabDefs.push({ id: "history", label: "이력사항" });
        if (d.edu) tabDefs.push({ id: "edu", label: "학위 · 저서" });

        // 탭이 1개면 탭바 숨기고 바로 표시
        var showTabBar = tabDefs.length > 1;
        tabsEl.style.display = showTabBar ? "flex" : "none";

        tabDefs.forEach(function (t, i) {
          var btn = document.createElement("button");
          btn.textContent = t.label;
          btn.dataset.tab = t.id;
          if (i === 0) btn.classList.add("active");
          btn.onclick = function () {
            switchTab(t.id);
          };
          tabsEl.appendChild(btn);
        });

        // 콘텐츠 렌더
        // 경력
        var careerEl = document.getElementById("tab-career");
        if (d.career) {
          careerEl.innerHTML =
            '<div class="section-label">경력사항</div>' +
            d.career
              .map(function (c) {
                return c;
              })
              .join("<br>");
        }

        // 이력
        var historyEl = document.getElementById("tab-history");
        if (d.history) {
          historyEl.innerHTML =
            '<div class="section-label">이력사항</div>' +
            d.history
              .map(function (h) {
                return "· " + h;
              })
              .join("<br>");
        }

        // 학위·저서
        var eduEl = document.getElementById("tab-edu");
        if (d.edu) {
          var html =
            '<div class="section-label">학위</div>' +
            d.edu.degree
              .map(function (e) {
                return "· " + e;
              })
              .join("<br>");
          if (d.edu.books) {
            html +=
              '<div class="section-label">저서</div>' +
              d.edu.books
                .map(function (b) {
                  return "· " + b;
                })
                .join("<br>");
          }
          eduEl.innerHTML = html;
        }

        // 모든 탭 콘텐츠 숨기고 첫 번째만 표시
        document.querySelectorAll(".tab-content").forEach(function (el) {
          el.classList.remove("active");
          el.style.display = "none";
        });
        if (tabDefs.length > 0) {
          var first = document.getElementById("tab-" + tabDefs[0].id);
          first.classList.add("active");
          first.style.display = "block";
        }
      }

      function switchTab(tabId) {
        document.querySelectorAll(".tab-content").forEach(function (el) {
          el.classList.remove("active");
          el.style.display = "none";
        });
        var target = document.getElementById("tab-" + tabId);
        target.classList.add("active");
        target.style.display = "block";

        document.querySelectorAll(".profile-tabs button").forEach(function (b) {
          b.classList.toggle("active", b.dataset.tab === tabId);
        });
      }

      function doSearch() {
        var v = document.getElementById("searchInput").value.trim();
        if (!v) {
          alert("찾으시는 매니저 이름을 입력해 주세요.");
          return;
        }

        // 1) 로컬 데모 데이터에서 먼저 검색
        var found = null;
        Object.keys(profiles).forEach(function (k) {
          if (profiles[k].name === v) found = k;
        });
        if (found) {
          loadProfile(found);
          document.querySelectorAll(".demo-bar button").forEach(function (b) {
            b.classList.remove("active");
          });
          return;
        }

        // 2) 레거시 서버 API 프록시 호출
        var card = document.getElementById("profileCard");
        var noResult = document.getElementById("noResult");
        card.style.display = "none";
        noResult.style.display = "block";
        noResult.querySelector("p").textContent = "검색 중...";

        fetch("/api/couple-manager/search?cmgName=" + encodeURIComponent(v))
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            if (!data.found || !data.manager) {
              noResult.querySelector("p").textContent = "검색 결과가 없습니다";
              return;
            }
            var m = data.manager;
            // 동적 프로필 객체 생성
            profiles["_live"] = {
              badge: m.role || "커플매니저",
              name: m.name,
              role: m.role || "",
              photo: m.photo,
              career: m.career,
              history: m.history,
              edu: m.education ? { degree: m.education, books: null } : null,
            };
            loadProfileDirect("_live");
          })
          .catch(function () {
            noResult.querySelector("p").textContent =
              "서버 연결에 실패했습니다";
          });

        document.querySelectorAll(".demo-bar button").forEach(function (b) {
          b.classList.remove("active");
        });
      }

      function loadProfileDirect(key) {
        var card = document.getElementById("profileCard");
        var noResult = document.getElementById("noResult");
        var d = profiles[key];
        if (!d) return;

        card.style.display = "block";
        noResult.style.display = "none";

        document.getElementById("profileBadge").textContent = d.badge;
        document.getElementById("profileName").textContent = d.name;
        document.getElementById("profileRole").textContent = d.role;

        // 프로필 사진 교체 (API에서 받은 경우)
        if (d.photo) {
          var imgEl = card.querySelector(".profile-photo img");
          if (imgEl) imgEl.src = d.photo;
        }

        var tabsEl = document.getElementById("profileTabs");
        tabsEl.innerHTML = "";
        var tabDefs = [];
        if (d.career) tabDefs.push({ id: "career", label: "경력" });
        if (d.history) tabDefs.push({ id: "history", label: "이력사항" });
        if (d.edu) tabDefs.push({ id: "edu", label: "학위 · 저서" });

        tabsEl.style.display = tabDefs.length > 1 ? "flex" : "none";
        tabDefs.forEach(function (t, i) {
          var btn = document.createElement("button");
          btn.textContent = t.label;
          btn.dataset.tab = t.id;
          if (i === 0) btn.classList.add("active");
          btn.onclick = function () {
            switchTab(t.id);
          };
          tabsEl.appendChild(btn);
        });

        if (d.career) {
          document.getElementById("tab-career").innerHTML =
            '<div class="section-label">경력사항</div>' + d.career.join("<br>");
        }
        if (d.history) {
          document.getElementById("tab-history").innerHTML =
            '<div class="section-label">이력사항</div>' +
            d.history
              .map(function (h) {
                return "· " + h;
              })
              .join("<br>");
        }
        if (d.edu) {
          var html =
            '<div class="section-label">학위</div>' +
            d.edu.degree
              .map(function (e) {
                return "· " + e;
              })
              .join("<br>");
          if (d.edu.books) {
            html +=
              '<div class="section-label">저서</div>' +
              d.edu.books
                .map(function (b) {
                  return "· " + b;
                })
                .join("<br>");
          }
          document.getElementById("tab-edu").innerHTML = html;
        }

        document.querySelectorAll(".tab-content").forEach(function (el) {
          el.classList.remove("active");
          el.style.display = "none";
        });
        if (tabDefs.length > 0) {
          var first = document.getElementById("tab-" + tabDefs[0].id);
          first.classList.add("active");
          first.style.display = "block";
        }
      }

      // 엔터키 검색
      document
        .getElementById("searchInput")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter") doSearch();
        });

      // 초기 로드
      loadProfile("ceo");
    </script>
  </body>
</html>
