<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=400" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Serif+KR:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 400px;
        overflow: hidden;
        background: #0a0703;
        font-family: "Inter", sans-serif;
      }
      #root {
        width: 1920px;
        height: 400px;
        position: relative;
        overflow: hidden;
        background: #1a1206;
      }

      /* 가운데 골드 라인 (인트로용) */
      .center-line {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, #f4dd96, transparent);
        transform: translate(-50%, -50%);
        z-index: 3;
        box-shadow: 0 0 20px rgba(244, 221, 150, 0.6);
      }

      /* 인트로 타이포 — 단색 화이트골드 + 강한 글로우 */
      .eyebrow {
        position: absolute;
        left: 50%;
        top: 32%;
        transform: translate(-50%, -50%);
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 22px;
        letter-spacing: 12px;
        text-transform: uppercase;
        color: #fff5d8;
        opacity: 0;
        z-index: 4;
        text-shadow:
          0 0 30px rgba(255, 245, 216, 0.95),
          0 0 60px rgba(244, 221, 150, 0.5);
      }
      .title {
        position: absolute;
        left: 50%;
        top: 58%;
        transform: translate(-50%, -50%);
        font-family: "Inter", sans-serif;
        font-weight: 900;
        font-size: 88px;
        letter-spacing: -2.5px;
        color: #fff5d8;
        opacity: 0;
        z-index: 4;
        text-shadow:
          0 0 50px rgba(255, 245, 216, 0.95),
          0 0 100px rgba(244, 221, 150, 0.55);
      }

      /* stats row */
      .stats-row {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        align-items: center;
        z-index: 5;
        opacity: 0;
      }
      .stat {
        text-align: center;
        padding: 0 20px;
        border-right: 1px solid rgba(184, 154, 90, 0.35);
      }
      .stat:last-child {
        border-right: 0;
      }
      .stat-num {
        font-family: "Inter", sans-serif;
        font-weight: 800;
        font-size: 96px;
        letter-spacing: -3px;
        line-height: 1;
        margin-bottom: 16px;
        background: linear-gradient(
          90deg,
          #d4b369 0%,
          #f0d889 22%,
          #fff5d8 42%,
          #ffffff 50%,
          #fff5d8 58%,
          #f0d889 78%,
          #d4b369 100%
        );
        background-size: 200% 100%;
        background-position: 50% 50%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 0 30px rgba(255, 245, 216, 0.8))
          drop-shadow(0 0 60px rgba(244, 221, 150, 0.4));
      }
      .stat-num .suf {
        font-size: 0.36em;
        font-weight: 700;
        margin-left: 4px;
        letter-spacing: 0;
      }
      .stat-label {
        font-family: "Noto Serif KR", serif;
        font-weight: 700;
        font-size: 24px;
        color: #fff5d8;
        margin-bottom: 8px;
        letter-spacing: -0.3px;
        text-shadow: 0 0 12px rgba(244, 221, 150, 0.3);
      }
      .stat-sub {
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: rgba(255, 245, 216, 0.85);
        font-family: "Inter", sans-serif;
      }
      .border {
        position: absolute;
        inset: 8px;
        border: 1px solid rgba(184, 154, 90, 0.45);
        z-index: 8;
        pointer-events: none;
        opacity: 0;
      }
      .border-outer {
        position: absolute;
        inset: 0;
        border: 1px solid rgba(184, 154, 90, 0.25);
        z-index: 8;
        pointer-events: none;
        opacity: 0;
      }

      .corner {
        position: absolute;
        width: 18px;
        height: 18px;
        border: 1px solid #f4dd96;
        z-index: 8;
        opacity: 0;
      }
      .c-tl {
        top: 12px;
        left: 12px;
        border-right: 0;
        border-bottom: 0;
      }
      .c-tr {
        top: 12px;
        right: 12px;
        border-left: 0;
        border-bottom: 0;
      }
      .c-bl {
        bottom: 12px;
        left: 12px;
        border-right: 0;
        border-top: 0;
      }
      .c-br {
        bottom: 12px;
        right: 12px;
        border-left: 0;
        border-top: 0;
      }

      /* 위→아래 파티클 (V-2 스타일, 크기 균일 3px, 랜덤 등장/소멸) */
      .particle {
        position: absolute;
        width: 3px;
        height: 3px;
        background: radial-gradient(
          circle,
          #f4dd96 0%,
          rgba(244, 221, 150, 0.5) 40%,
          transparent 75%
        );
        border-radius: 50%;
        opacity: 0;
        z-index: 2;
      }

      /* Gold Dust grain — Particle Wipe trail (본 홈페이지 패턴) */
      .gold-dust {
        position: absolute;
        border-radius: 50%;
        opacity: 0;
        z-index: 6;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="400"
    >
      <div
        id="particles"
        class="clip"
        data-start="0"
        data-duration="10"
        data-track-index="2"
      ></div>

      <div
        id="gold-dust"
        class="clip"
        data-start="0"
        data-duration="10"
        data-track-index="20"
      ></div>

      <div
        class="center-line clip"
        id="cline"
        data-start="0"
        data-duration="10"
        data-track-index="3"
      ></div>

      <div
        class="eyebrow clip"
        id="eyebrow"
        data-start="0"
        data-duration="10"
        data-track-index="4"
      >
        Noble HONG · Numbers
      </div>
      <div
        class="title clip"
        id="title"
        data-start="0"
        data-duration="10"
        data-track-index="5"
      >
        Since 1996
      </div>

      <div
        class="stats-row clip"
        id="row"
        data-start="0"
        data-duration="10"
        data-track-index="6"
      >
        <div class="stat">
          <div class="stat-num" id="n1">0<span class="suf">년</span></div>
          <div class="stat-label">매칭 노하우</div>
          <div class="stat-sub">Since 1996</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="n2">0<span class="suf">명+</span></div>
          <div class="stat-label">성혼 기준</div>
          <div class="stat-sub">커플매니저 제1호</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="n3">0<span class="suf">%</span></div>
          <div class="stat-label">30대 교제율</div>
          <div class="stat-sub">3회 이상 만남</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="n4">0<span class="suf">년 연속</span></div>
          <div class="stat-label">브랜드만족지수 1위</div>
          <div class="stat-sub">2022~2024</div>
        </div>
      </div>

      <div
        class="border-outer clip"
        id="bord-out"
        data-start="0"
        data-duration="10"
        data-track-index="7"
      ></div>
      <div
        class="border clip"
        id="bord-in"
        data-start="0"
        data-duration="10"
        data-track-index="8"
      ></div>
      <div
        class="corner c-tl clip"
        id="ctl"
        data-start="0"
        data-duration="10"
        data-track-index="9"
      ></div>
      <div
        class="corner c-tr clip"
        id="ctr"
        data-start="0"
        data-duration="10"
        data-track-index="10"
      ></div>
      <div
        class="corner c-bl clip"
        id="cbl"
        data-start="0"
        data-duration="10"
        data-track-index="11"
      ></div>
      <div
        class="corner c-br clip"
        id="cbr"
        data-start="0"
        data-duration="10"
        data-track-index="12"
      ></div>
    </div>

    <script>
      function seeded(seed) {
        let s = seed;
        return () => {
          s = (s * 9301 + 49297) % 233280;
          return s / 233280;
        };
      }

      // V-2 스타일 파티클: 위→아래, 크기 균일 3px, 랜덤 등장/소멸
      const pcontainer = document.getElementById("particles");
      const particles = [];
      const rand = seeded(7);
      for (let i = 0; i < 55; i++) {
        const p = document.createElement("div");
        p.className = "particle clip";
        const x = rand() * 1920;
        const startY = -30 - rand() * 120;
        p.style.left = x + "px";
        p.style.top = startY + "px";
        p.dataset.start = "0";
        p.dataset.duration = "5";
        p.dataset.trackIndex = "2";
        pcontainer.appendChild(p);
        particles.push({
          el: p,
          startY,
          dur: 3 + rand() * 2.5,
          delay: rand() * 5,
        });
      }

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 파티클 위→아래 흐름 (7초 안에 stagger, 살아있는 느낌으로 fade)
      particles.forEach((p) => {
        const fadeIn = 0.5;
        const fadeOut = 0.6;
        const startTime = p.delay * (10 / 5); // 10초에 맞게 stagger 조정
        tl.fromTo(
          p.el,
          { y: 0, opacity: 0 },
          { y: 440 - p.startY, duration: p.dur, ease: "sine.inOut" },
          startTime,
        );
        tl.to(
          p.el,
          { opacity: 0.8, duration: fadeIn, ease: "sine.out" },
          startTime,
        );
        tl.to(
          p.el,
          { opacity: 0, duration: fadeOut, ease: "sine.in" },
          startTime + p.dur - fadeOut,
        );
      });

      // 가운데 골드 라인 등장 (0.5~1.2초) — 좌→우로 그어짐
      tl.fromTo(
        "#cline",
        { width: 0 },
        { width: 600, duration: 0.7, ease: "power3.out" },
        0.5,
      );

      // 타이포 등장 (1.0~1.8초) — 라인 위에서
      tl.fromTo(
        "#eyebrow",
        { opacity: 0, y: 8 },
        { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" },
        1.0,
      ).fromTo(
        "#title",
        { opacity: 0, scale: 0.92, y: 12 },
        { opacity: 1, scale: 1, y: 0, duration: 0.8, ease: "power3.out" },
        1.1,
      );

      // 라인 더 확장 후 페이드아웃 (1.5~2.0초)
      tl.to(
        "#cline",
        { width: 1200, duration: 0.4, ease: "power2.out" },
        1.5,
      ).to("#cline", { opacity: 0, duration: 0.4 }, 1.9);

      // 타이포 안정 유지 (1.8~3.0초 = 1.2초간 충분히 보임)
      // 타이포 사라짐 (3.0~3.4초)
      tl.to(
        ["#eyebrow", "#title"],
        { opacity: 0, y: -8, duration: 0.4, ease: "power2.in" },
        3.0,
      ).set(["#eyebrow", "#title"], { visibility: "hidden" }, 3.4);

      // stats row + 코너 등장 (3.3~3.85초)
      tl.fromTo(
        "#row",
        { opacity: 0 },
        { opacity: 1, duration: 0.55 },
        3.3,
      ).fromTo(
        ["#bord-out", "#bord-in", "#ctl", "#ctr", "#cbl", "#cbr"],
        { opacity: 0 },
        { opacity: 1, duration: 0.55, stagger: 0.05 },
        3.3,
      );

      // 카운트업 (2.3~4.6초) — sine.inOut으로 부드럽게, 2.3초 동안 천천히
      const counts = [
        { id: "#n1", from: 0, to: 30, suf: "년" },
        { id: "#n2", from: 0, to: 8000, suf: "명+", sep: true },
        { id: "#n3", from: 0, to: 75, suf: "%" },
        { id: "#n4", from: 0, to: 3, suf: "년 연속" },
      ];
      counts.forEach((c) => {
        const obj = { val: c.from };
        tl.to(
          obj,
          {
            val: c.to,
            duration: 2.0,
            ease: "sine.inOut",
            onUpdate: function () {
              const v = Math.round(obj.val);
              const num = c.sep ? v.toLocaleString("en-US") : v;
              document.querySelector(c.id).innerHTML =
                num + '<span class="suf">' + c.suf + "</span>";
            },
          },
          3.6,
        );
      });

      // 카운트 끝난 후 (5.4초~) — TX-A Gold Foil Shimmer
      // 좌→우 stagger + 한 방향 끊김 없이 이어짐 (background-size 200% × 2.4초/주기)
      const shimmerIds = ["#n1", "#n2", "#n3", "#n4"];
      const cycleDuration = 2.4;
      const staggerStep = 0.3;
      const shimmerStart = 5.4;
      const totalCycles = 2; // 2주기 = 4.8초 (5.4~10.2초)

      shimmerIds.forEach((id, i) => {
        // 시작 위치 50% (가장 밝은 가운데) → -350% (한 방향, 끊김 없이)
        const startPos = 50;
        const endPos = startPos - 200 * totalCycles;
        tl.fromTo(
          id,
          { backgroundPosition: `${startPos}% 50%` },
          {
            backgroundPosition: `${endPos}% 50%`,
            duration: cycleDuration * totalCycles,
            ease: "none",
          },
          shimmerStart + i * staggerStep,
        );
      });

      // Gold Dust Particle Wipe — 본 홈페이지 hero eyebrow 효과 패턴
      // trail head가 좌→우로 이동하며 head 위치에서 grain spawn → fade out
      // baseY = stat-sub 텍스트 아래쪽 (박스 하단 라인 위)
      const dustC = document.getElementById("gold-dust");
      const rand2 = seeded(99);
      const GOLDS = [
        "rgba(255,248,224,",
        "rgba(240,221,160,",
        "rgba(217,197,119,",
        "rgba(196,165,90,",
        "rgba(255,245,200,",
      ];

      // 박스 텍스트 영역 (y 120~280)을 침범하지 않는 안전 영역
      // = y 300~385 (박스 하단 영역만)
      const trailY = 340;
      const trailStart = 5.4;
      const trailDuration = 4.6; // 5.4~10초
      const spawnRate = 0.025; // 0.025초마다 spawn (큰 grain이라 약간 줄임)
      const numSpawns = Math.floor(trailDuration / spawnRate);

      for (let i = 0; i < numSpawns; i++) {
        const spawnTime = trailStart + i * spawnRate;
        const headProgress = i / numSpawns;
        const headX = -30 + headProgress * 2000; // 좌→우
        // 큰 획 같은 불규칙 곡선 — 진폭 작게 (텍스트 안 닿게)
        const headY =
          trailY +
          Math.sin(headProgress * Math.PI * 2 * 1.5) * 14 +
          Math.sin(headProgress * Math.PI * 2 * 3.7 + 1.5) * 7 +
          Math.sin(headProgress * Math.PI * 2 * 7.1 + 2.7) * 3;

        // spawn당 grain 5개 (큰 획 두께)
        for (let j = 0; j < 5; j++) {
          // 큰 grain: 4~10px (붓 두께)
          const baseSz = 4 + rand2() * 6;
          // 60% 확률로 가로 직사각형 (brush stroke 모양)
          const isRect = rand2() < 0.6;
          const w = isRect ? baseSz * 2 : baseSz;
          const h = isRect ? baseSz * 0.6 : baseSz;
          const offsetX = (rand2() - 0.5) * 6;
          const offsetY = (rand2() - 0.5) * 8;
          const driftX = -4 + rand2() * 8;
          const driftY = -4 - rand2() * 10;
          const life = 1.0 + rand2() * 1.5;
          const colorIdx = Math.floor(rand2() * GOLDS.length);
          const color = GOLDS[colorIdx];

          const d = document.createElement("div");
          d.className = "gold-dust clip";
          d.style.left = headX + offsetX + "px";
          d.style.top = headY + offsetY + "px";
          d.style.width = w + "px";
          d.style.height = h + "px";
          d.style.background = color + "1)";
          d.style.boxShadow =
            "0 0 8px " + color + "0.8), 0 0 16px " + color + "0.4)";
          if (isRect) d.style.borderRadius = "1.5px";
          d.dataset.start = "0";
          d.dataset.duration = "10";
          d.dataset.trackIndex = "20";
          dustC.appendChild(d);

          // 등장 (twinkle in)
          tl.fromTo(
            d,
            { opacity: 0, scale: 0.4 },
            { opacity: 1, scale: 1, duration: 0.18, ease: "sine.out" },
            spawnTime,
          );
          // drift + fade out
          tl.to(
            d,
            {
              x: driftX,
              y: driftY,
              opacity: 0,
              scale: 0.7,
              duration: life,
              ease: "sine.in",
            },
            spawnTime + 0.18,
          );
        }
      }

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
